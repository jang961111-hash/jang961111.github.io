<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var l = window.location;
        var path = l.pathname.replace(/^\//, "");
        var query = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";
        var target = l.protocol + "//" + l.host + "/?/" + path.replace(/&/g, "~and~") + query + l.hash;

        window.location.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
